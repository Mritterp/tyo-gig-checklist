<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Production Checklist</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A73E8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Production Checklist">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{overscroll-behavior-y:none;}
:root{
  --bg:#F2F3F5;--surface:#FFFFFF;--surface2:#F7F7F9;--surface3:#EFEFF4;
  --border:#E5E5EA;--border2:#D1D5DB;
  --text:#1C1C1E;--text-muted:#6E6E73;--text-dim:#3A3A3C;--text-faint:#8E8E93;
  --blue:#1A73E8;--blue-dim:#E8F0FE;--blue-border:#A8C4F5;
  --green:#34C759;--green-dim:#E4F8EA;--green-border:#A7E6B9;
  --orange:#FF9500;--orange-dim:#FFF3E2;--orange-border:#FFD9A6;
  --danger:#FF3B30;--danger-dim:rgba(255,59,48,0.1);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* HEADER */
.app-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.brand{font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:400;color:var(--text);}
.logo-mark{width:26px;height:26px;border:1.5px solid #C7C7CC;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark-inner{width:13px;height:13px;border:1.5px solid var(--blue);}
.back-btn{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;padding:4px 0;}
.back-btn:hover{color:var(--text);}

/* TAB BAR */
.tab-bar{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.tbi{flex:1;text-align:center;padding:11px 0 13px;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text-faint);cursor:pointer;border-top:2px solid transparent;margin-top:-1px;transition:color .15s,border-color .15s;}
.tbi.active{color:var(--blue);border-top-color:var(--blue);}

/* DASHBOARD */
.dash-main{flex:1;padding:18px 18px 0;overflow-y:auto;padding-bottom:calc(72px + env(safe-area-inset-bottom));}
.section-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.section-label.orange{color:var(--orange);}
.section-label.muted{color:var(--text-faint);}

.up-next-card{border:1.5px solid var(--orange-border);background:var(--orange-dim);border-radius:14px;padding:14px;margin-bottom:20px;cursor:pointer;transition:opacity .15s;}
.up-next-card:hover{opacity:.92;}
.up-next-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:2px;}
.up-next-name{font-family:Georgia,serif;font-size:19px;font-weight:400;color:var(--text);line-height:1.3;}
.up-next-call{font-size:12px;color:var(--orange);letter-spacing:.5px;margin-bottom:12px;}
.up-next-progress-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text);margin-bottom:6px;}
.up-next-pct{color:var(--orange);font-weight:600;}
.up-next-bar{height:6px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden;}
.up-next-bar-fill{height:100%;border-radius:4px;}

.gig-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.gig-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;cursor:pointer;transition:border-color .15s;position:relative;}
.gig-card:hover{border-color:var(--border2);}
.gig-card-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px;}
.gig-card-name{font-family:Georgia,serif;font-size:17px;font-weight:400;color:var(--text);line-height:1.25;}
.gig-card-chevron{color:var(--text-faint);font-size:18px;line-height:1;flex-shrink:0;}
.gig-card-meta{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
.gig-card-progress-row{display:flex;align-items:center;gap:9px;}
.gig-card-bar{flex:1;height:6px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.gig-card-bar-fill{height:100%;border-radius:4px;}
.gig-card-count{font-size:12px;color:var(--text-muted);flex-shrink:0;}
.gig-phase-dots{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.gig-phase-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface3);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;}
.gig-phase-dot.done{background:var(--green);border-color:var(--green);color:#fff;}
.gig-card-del{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--text-faint);padding:4px;opacity:0;transition:opacity .15s;}
.gig-card:hover .gig-card-del{opacity:1;}
.gig-card-del:hover{color:var(--danger);}

.new-gig-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:10px;border:1.5px dashed var(--border2);background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:18px;transition:all .15s;}
.new-gig-btn:hover{border-color:var(--blue);color:var(--blue);}
.empty-state{text-align:center;padding:44px 24px;color:var(--text-muted);font-size:13px;line-height:1.7;border:1.5px dashed var(--border2);border-radius:12px;margin-bottom:14px;background:var(--surface);}
.empty-state strong{display:block;color:var(--text-dim);font-size:15px;margin-bottom:6px;}

/* NEW GIG */
.form-main{flex:1;padding:18px 18px calc(160px + env(safe-area-inset-bottom));overflow-y:auto;}
.field-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px;display:block;}
.field-label.orange{color:var(--orange);}
.field-group{margin-bottom:18px;}
.text-field{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;font-family:'Inter',sans-serif;}
.text-field:focus{border-color:var(--blue);}
.text-field::placeholder{color:var(--text-faint);}
.date-row{display:flex;gap:10px;}
.date-row>div{flex:1;}
.date-field{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text-dim);outline:none;color-scheme:light;transition:border-color .15s;}
.date-field:focus{border-color:var(--blue);}
.call-field{width:100%;background:var(--surface);border:1.5px solid var(--orange-border);border-radius:8px;padding:11px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none;color-scheme:light;transition:border-color .15s;}
.call-field:focus{border-color:var(--orange);}

.kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kit-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;position:relative;user-select:none;transition:all .15s;}
.kit-card.selected{border:1.5px solid var(--green-border);background:var(--green-dim);border-radius:12px;}
.kit-card.dragging{opacity:0.35;border-style:dashed;}
.kit-card.drag-over{border-color:var(--blue);background:var(--blue-dim,#E8F0FE);}
.kit-item-row.drag-over,.step-row.drag-over,.tpl-kit-row.drag-over,.lib-item.drag-over{border-color:var(--blue);background:var(--blue-dim);}
.kit-card-check{position:absolute;top:7px;right:7px;width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;background:var(--surface);transition:all .15s;}
.kit-card.selected .kit-card-check{background:var(--green);border-color:var(--green);}
.kit-card-check svg{display:none;}
.kit-card.selected .kit-card-check svg{display:block;}
.kit-card-name{font-size:13px;font-weight:600;color:var(--text);padding-right:20px;margin-bottom:3px;}
.kit-card-sub{font-size:11px;color:var(--text-muted);line-height:1.4;}
.kit-drag-handle{position:absolute;bottom:6px;right:7px;font-size:11px;color:var(--border2);line-height:1;cursor:grab;touch-action:none;padding:4px;}

.extra-tasks-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.extra-task-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;transition:background .1s,border-color .1s;}
.extra-task-row.shared-on{background:var(--orange-dim);border-color:var(--orange-border);border-left:3px solid var(--orange);}
.extra-task-text{font-size:14px;color:var(--text);flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;}
.extra-task-text::placeholder{color:var(--text-faint);}
.extra-task-remove{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px;display:flex;align-items:center;}
.add-extra-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:6px 0;font-family:'Inter',sans-serif;}

.build-bar{position:fixed;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:100;}
.build-summary{font-size:12px;color:var(--text-muted);}
.build-btn{padding:12px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;}
.build-btn:disabled{opacity:.3;cursor:not-allowed;}

/* LIBRARY */
.lib-main{flex:1;padding:14px 18px calc(72px + env(safe-area-inset-bottom));overflow-y:auto;}
.seg-ctrl{display:flex;gap:4px;background:var(--surface3);border-radius:10px;padding:3px;margin-bottom:16px;}
.seg-tab{flex:1;text-align:center;padding:9px;border-radius:8px;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--text-muted);cursor:pointer;user-select:none;transition:all .15s;}
.seg-tab.active{background:var(--surface);color:var(--text);}

.lib-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .1s,background .1s;}
.lib-item.open{border:1.5px solid var(--green-border);background:var(--green-dim);}
.lib-item-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;}
.lib-item-name{font-size:15px;font-weight:600;color:var(--text);}
.lib-item-right{font-size:12px;color:var(--text-muted);}
.lib-item-body{padding:0 14px 6px;}

.kit-color-picker{display:flex;flex-wrap:wrap;gap:8px;padding:10px 0 6px;}
.kit-color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;box-sizing:border-box;flex-shrink:0;}
.kit-color-swatch.sel{border-color:rgba(0,0,0,0.45);transform:scale(1.18);}
.kit-color-none{background:var(--border2);color:var(--text-muted);font-size:11px;display:flex;align-items:center;justify-content:center;}
.tpl-kit-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.tpl-kit-row{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:8px;}
.drag-handle{color:var(--border2);font-size:13px;letter-spacing:-1px;flex-shrink:0;touch-action:none;cursor:grab;padding:12px 14px;margin:-12px -6px;}
.tpl-kit-name{flex:1;font-size:13px;color:var(--text);}
.tpl-kit-count{font-size:12px;color:var(--text-muted);flex-shrink:0;}
.row-remove{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px;display:flex;align-items:center;}
.row-remove:hover{color:var(--danger);}

.tpl-add-row{display:flex;gap:6px;margin-bottom:10px;}
.tpl-add-sel{flex:1;background:var(--surface);border:1px dashed var(--green-border);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--text-dim);font-family:'Inter',sans-serif;outline:none;color-scheme:light;}
.tpl-add-btn{padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;}
.kit-lib-dropdown{position:relative;flex:1;}
.kit-lib-dd-btn{width:100%;background:var(--surface);border:1px dashed var(--green-border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text-dim);font-family:'Inter',sans-serif;cursor:pointer;text-align:left;}
.kit-lib-dd-panel{display:none;position:fixed;background:var(--surface);border:1.5px solid var(--green-border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;max-height:220px;overflow-y:auto;}
.kit-lib-dd-panel.open{display:block;}
.kit-lib-dd-item{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;font-size:13px;color:var(--text);}
.kit-lib-dd-item:hover{background:var(--bg2);}
.kit-lib-dd-name{flex:1;}
.kit-lib-dd-count{color:var(--text-muted);font-size:12px;flex-shrink:0;}
.kit-lib-dd-empty{padding:10px 13px;font-size:13px;color:var(--text-muted);}

.kit-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.kit-item-row{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:7px;transition:background .1s,border-color .1s;}
.kit-item-row.shared-on{background:var(--orange-dim);border-color:var(--orange-border);border-left:3px solid var(--orange);}
.kit-item-bang{width:14px;height:14px;border-radius:50%;background:var(--orange);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.kit-item-input{flex:1;min-width:0;font-size:13px;color:var(--text-dim);background:transparent;border:none;border-bottom:1px solid transparent;outline:none;padding:2px 0;font-family:'Inter',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kit-item-input:focus{border-color:var(--border2);}
.kit-shared-label{font-size:9px;font-weight:600;letter-spacing:.5px;flex-shrink:0;text-align:right;}
.kit-shared-label.on{color:var(--orange);}
.kit-shared-label.off{color:var(--text-faint);}

.shared-toggle{width:30px;height:17px;border-radius:9px;background:var(--border2);border:none;cursor:pointer;position:relative;padding:0;flex-shrink:0;transition:background .2s;}
.shared-toggle.on{background:var(--orange);}
.shared-toggle .st-dot{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:transform .2s;}
.shared-toggle.on .st-dot{transform:translateX(13px);}

.kit-routine-tabs{display:flex;gap:0;padding:0 0 0;border-bottom:1px solid var(--green-border);margin:0 0 10px;}
.kit-rtab{flex:1;text-align:center;color:var(--text-faint);cursor:pointer;padding:10px 0 8px;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;font-size:12px;font-weight:600;letter-spacing:1px;}
.kit-rtab.active{color:var(--text);border-bottom-color:var(--green);}
.kit-rtab-count{color:var(--text-faint);font-weight:400;}
.kit-rtab.active .kit-rtab-count{color:var(--text-muted);}
.step-row{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.step-input{flex:1;font-size:13px;color:var(--text-dim);background:transparent;border:none;border-bottom:1px solid transparent;outline:none;padding:2px 0;font-family:'Inter',sans-serif;}
.step-input:focus{border-color:var(--border2);}
.lib-hint{font-size:10px;color:var(--text-faint);line-height:1.4;padding:2px 0 8px;}
.lib-name-input{font-size:15px;font-weight:600;color:var(--text);width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--blue);outline:none;font-family:'Inter',sans-serif;margin-bottom:10px;display:block;}
.lib-footer{display:flex;gap:8px;padding:6px 0 12px;}
.lib-save{flex:1;text-align:center;border-radius:8px;background:var(--blue);color:#fff;padding:10px;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.lib-delete{flex:1;text-align:center;border-radius:8px;border:1px solid var(--orange-border);color:var(--orange);padding:10px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;font-family:'Inter',sans-serif;}
.lib-add-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:10px;border:1.5px dashed var(--border2);background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:4px;transition:all .15s;}
.lib-add-btn:hover{border-color:var(--blue);color:var(--blue);}
.add-item-link{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:4px 0 10px;font-family:'Inter',sans-serif;}

/* CHECKLIST */
.cl-header{background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;padding:10px 18px 0;}
.cl-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cl-back{font-size:13px;color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;padding:0;}
.cl-back:hover{color:var(--text);}
.cl-date{font-size:12px;color:var(--text-muted);}
.cl-gig-name{font-family:Georgia,serif;font-size:21px;font-weight:400;color:var(--text);margin-bottom:12px;cursor:pointer;line-height:1.2;}
.cl-gig-name-input{font-family:Georgia,serif;font-size:21px;color:var(--text);width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--blue);outline:none;margin-bottom:12px;}
.phase-tabs{display:flex;margin-bottom:10px;}
.phase-tab{flex:1;text-align:center;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--text-faint);cursor:pointer;padding:10px 0 10px;border-bottom:2px solid transparent;white-space:nowrap;user-select:none;transition:color .15s,border-color .15s;}
.phase-tab.active{color:var(--text);border-bottom-color:var(--blue);}
.cl-progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text);margin-bottom:6px;}
.cl-progress-pct{color:var(--text-muted);}
.cl-progress-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.cl-progress-fill{height:100%;background:var(--orange);border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1),background .3s;}
@keyframes pulseComplete{0%,100%{opacity:1}50%{opacity:.4}}
.cl-progress-fill.flash{animation:pulseComplete .5s ease-in-out 2;}

.cl-main{flex:1;overflow-y:auto;padding:14px 18px calc(72px + env(safe-area-inset-bottom));}
.phase-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.phase-stats{font-size:13px;color:var(--text-muted);}
.phase-stats em{color:var(--text);font-style:normal;font-weight:600;}
.phase-stats.complete em{color:var(--green);}
.phase-actions{display:flex;gap:6px;}
.sm-btn{padding:6px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text-muted);font-family:'Inter',sans-serif;}
.sm-btn.green{border-color:var(--green-border);color:var(--green);}

/* KIT CARDS */
.category{margin-bottom:8px;}
.category-header{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--border);cursor:pointer;user-select:none;transition:border-color .1s,background .1s;}
.category-header.kit-done{background:var(--green-dim);border:1.5px solid var(--green-border);}
.category-header.kit-partial{background:var(--orange-dim);border:1.5px solid var(--orange-border);}
.kit-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.kit-done-check{background:var(--green);border-color:var(--green);}
.kit-partial-check{background:var(--surface);border-color:var(--orange);position:relative;}
.kit-partial-check::after{content:'';display:block;width:10px;height:2px;background:var(--orange);border-radius:1px;}
.category-title{font-size:15px;font-weight:600;color:var(--text);flex:1;line-height:1.3;}
.category-title-input{font-size:15px;font-weight:600;background:transparent;border:none;border-bottom:1.5px solid var(--blue);color:var(--text);outline:none;font-family:'Inter',sans-serif;flex:1;}
.kit-shared-badge{width:18px;height:18px;border-radius:50%;background:var(--orange);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.category-count{font-size:13px;font-weight:600;color:var(--text-faint);flex-shrink:0;}
.category-header.kit-done .category-count{color:var(--green);}
.category-header.kit-partial .category-count{color:var(--orange);}
.kit-chevron{color:var(--text-faint);font-size:16px;flex-shrink:0;line-height:1;}
.kit-del-btn{background:none;border:none;cursor:pointer;color:var(--text-faint);padding:4px 2px;flex-shrink:0;opacity:0;transition:opacity .15s;}
.category-header:hover .kit-del-btn,.kit-del-btn:focus{opacity:1;}
.kit-del-btn:hover{color:var(--danger);}
@media(max-width:1099px){.kit-del-btn{opacity:.5;}}

.category-body{display:none;padding:4px 0 2px 6px;}
.category-body.open{display:block;}
.items-list{display:flex;flex-direction:column;gap:2px;}
.item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;background:var(--surface);border:1px solid transparent;cursor:pointer;transition:background .1s;}
.item:hover{background:var(--surface2);}
.item.checked{background:transparent;}
.item.checked .item-text{color:var(--text-faint);text-decoration:line-through;}
.item.item-shared{background:var(--orange-dim);border-left:3px solid var(--orange);}
.item-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.item.checked .item-check{background:var(--green);border-color:var(--green);}
.item-text{font-size:13px;color:var(--text);flex:1;line-height:1.4;word-break:break-word;}
.item-text-input{font-size:13px;background:transparent;border:none;border-bottom:1px solid var(--blue);color:var(--text);outline:none;flex:1;font-family:'Inter',sans-serif;}
.shared-bang{width:16px;height:16px;border-radius:50%;background:var(--orange);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.shared-label{font-size:11px;color:var(--orange);font-weight:600;flex-shrink:0;white-space:nowrap;}
.item-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.item:hover .item-actions{opacity:1;}
.icon-btn{background:none;border:none;cursor:pointer;padding:3px;color:var(--text-faint);border-radius:3px;display:flex;align-items:center;}
.icon-btn.danger:hover{color:var(--danger);}
.item-stoggle{width:30px;height:17px;border-radius:9px;background:var(--border2);border:none;cursor:pointer;position:relative;padding:0;flex-shrink:0;transition:background .2s;}
.item-stoggle.on{background:var(--orange);}
.item-stoggle .st-dot{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:transform .2s;}
.item-stoggle.on .st-dot{transform:translateX(13px);}

.add-item-row{display:flex;align-items:center;gap:7px;padding:7px 11px;margin-top:2px;cursor:pointer;border-radius:8px;color:var(--text-dim);font-size:12px;font-weight:600;}
.add-item-row:hover{color:var(--blue);}
.add-cat-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;margin-top:8px;cursor:pointer;border-radius:10px;color:var(--text-dim);font-size:11px;font-weight:600;letter-spacing:1px;border:1.5px dashed var(--border2);background:none;width:100%;font-family:'Inter',sans-serif;}
.cl-hint{text-align:center;font-size:11px;color:var(--text-faint);line-height:1.5;margin-top:10px;padding:0 16px;}
.teardown-lead{font-size:12px;color:var(--text-muted);line-height:1.5;padding:0 2px 10px;}

/* SETTINGS */
.settings-main{flex:1;padding:18px 18px calc(72px + env(safe-area-inset-bottom));overflow-y:auto;}
.settings-section{margin-bottom:28px;}
.settings-section-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-left{display:flex;flex-direction:column;gap:3px;}
.settings-row-title{font-size:14px;font-weight:600;color:var(--text);}
.settings-row-sub{font-size:12px;color:var(--text-muted);line-height:1.4;}
.settings-toggle{width:44px;height:26px;border-radius:13px;background:var(--border2);border:none;cursor:pointer;position:relative;padding:0;flex-shrink:0;transition:background .25s;}
.settings-toggle.on{background:var(--green);}
.settings-toggle .st-dot{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .25s;}
.settings-toggle.on .st-dot{transform:translateX(18px);}
.settings-note{font-size:11px;color:var(--text-faint);line-height:1.5;margin-top:8px;padding:0 2px;}

/* GLOBAL TAB BAR */
.global-tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;border-top:1px solid var(--border);background:var(--surface);z-index:150;padding-bottom:env(safe-area-inset-bottom);}
.gtbi{flex:1;text-align:center;padding:14px 0 16px;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--text-faint);cursor:pointer;border-top:2px solid transparent;margin-top:-1px;transition:color .15s,border-color .15s;user-select:none;min-height:52px;}
.gtbi.active{color:var(--blue);border-top-color:var(--blue);}

/* UTILS */
.complete-flash{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;background:radial-gradient(ellipse at center,rgba(52,199,89,.08) 0%,transparent 70%);transition:opacity .3s;}
.complete-flash.show{opacity:1;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);padding:9px 18px;border-radius:8px;font-size:12px;color:#fff;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:480px){
  .kit-grid{grid-template-columns:1fr 1fr;}

}

/* Dark mode */
body.dark{
  --bg:#1C1C1E;--surface:#2C2C2E;--surface2:#3A3A3C;--surface3:#48484A;
  --border:#38383A;--border2:#545456;

  --green:#30D158;--green-dim:#0D2E18;--green-border:#1A5C30;

}

const PLAY_PRODUCT_ID = 'premium_yearly';
const KIT_COLORS=[
  {id:'tomato',hex:'#D50000'},

function kitColorHex(id){return KIT_COLORS.find(c=>c.id===id)?.hex||null;}
function catColorHex(cat){
  if(cat?.color)return kitColorHex(cat.color);
  if(cat?.globalCatId){const lib=getCat(cat.globalCatId);if(lib?.color)return kitColorHex(lib.color);}
  return null;

function colorDot(hex,size=10){return hex?`<span style="display:inline-block;width:${size}px;height:${size}px;border-radius:50%;background:${hex};flex-shrink:0;margin-right:5px"></span>`:'';}
function renderColorPicker(catId,currentColor){

  return`<div class="kit-color-picker">${none}${KIT_COLORS.map(c=>`<div class="kit-color-swatch${currentColor===c.id?' sel':''}" style="background:${c.hex}" onclick="setKitColor('${catId}','${c.id}')" title="${c.id}"></div>`).join('')}</div>`;

function setKitColor(catId,colorId){

let _fb=null,_fbAuth=null,_fbDb=null;
let syncUser=null,isPremiumUser=false;
let _syncTimer=null,_syncModalStep='signin';
const _fbConfigured=FIREBASE_CONFIG.apiKey!=='YOUR_API_KEY';

function initFirebase(){
  if(!_fbConfigured)return;
  try{
    _fb=firebase.initializeApp(FIREBASE_CONFIG);
    _fbAuth=firebase.auth();
    _fbDb=firebase.firestore();
    _fbAuth.onAuthStateChanged(onAuthChanged);
  }catch(e){}
}

async function onAuthChanged(user){
  syncUser=user;
  if(user){
    isPremiumUser=await checkPremiumStatus(user.uid);
    if(isPremiumUser)loadFromCloud(true);
  }else{
    isPremiumUser=false;
  }
  const active=document.querySelector('.screen.active');
  if(active?.id==='screenSettings')renderSettingsScreen();
}

async function checkPremiumStatus(uid){
  if(!_fbDb)return false;
  try{
    const doc=await _fbDb.collection('users').doc(uid).get();
    if(!doc.exists)return false;
    const sub=doc.data()?.premium;
    if(!sub||sub.status!=='active')return false;
    if(sub.expiresAt&&sub.expiresAt.toDate()<new Date())return false;
    return true;
  }catch(e){return false;}
}

async function signInWithEmail(isCreate){
  if(!_fbAuth){showToast('Auth not ready. Reload and try again.');return;}
  const emailEl=document.getElementById('syncEmailInput');
  const passEl=document.getElementById('syncPassInput');
  if(!emailEl||!passEl){showToast('Form not found.');return;}
  const email=emailEl.value.trim();
  const pass=passEl.value;
  if(!email||!pass){showToast('Enter your email and password.');return;}
  try{
    if(isCreate){
      await _fbAuth.createUserWithEmailAndPassword(email,pass);
    }else{
      await _fbAuth.signInWithEmailAndPassword(email,pass);
    }
    closeSyncModal();
  }catch(e){
    const msg={
      'auth/user-not-found':'No account with that email. Try "Create account".',
      'auth/wrong-password':'Incorrect password.',
      'auth/email-already-in-use':'Account exists. Use "Sign in" instead.',
      'auth/weak-password':'Password must be at least 6 characters.',
      'auth/invalid-email':'Enter a valid email address.',
      'auth/operation-not-allowed':'Email sign-in not enabled in Firebase Console.',
    }[e.code]||e.message||('Error: '+e.code)||'Sign-in failed.';
    showToast(msg);
  }
}

async function sendPasswordReset(){
  if(!_fbAuth)return;
  const emailEl=document.getElementById('syncEmailInput');
  const email=emailEl?emailEl.value.trim():'';
  if(!email){showToast('Enter your email first.');return;}
  try{
    await _fbAuth.sendPasswordResetEmail(email);
    showToast('Reset email sent — check your inbox.');
  }catch(e){
    showToast(e.message||'Could not send reset email.');
  }
}

function signOutSync(){
  if(!_fbAuth)return;
  _fbAuth.signOut();
  syncUser=null;isPremiumUser=false;
  showToast('Signed out');
  closeSyncModal();
  const active=document.querySelector('.screen.active');
  if(active?.id==='screenSettings')renderSettingsScreen();
}

async function syncToCloud(){
  if(!syncUser||!isPremiumUser||!_fbDb)return;
  try{
    const payload={appData:JSON.parse(JSON.stringify(appState)),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    await _fbDb.collection('users').doc(syncUser.uid).set(payload,{merge:true});
  }catch(e){console.warn('Sync failed:',e);}
}

async function loadFromCloud(forceCloud=false){
  if(!syncUser||!isPremiumUser||!_fbDb)return;
  try{
    const doc=await _fbDb.collection('users').doc(syncUser.uid).get();
    if(!doc.exists){syncToCloud();return;}
    const remote=doc.data();
    if(!remote?.appData){syncToCloud();return;}
    const remoteTs=remote.updatedAt?.toMillis?.()??0;
    const localTs=appState._updatedAt||0;
    const cloudHasGigs=(remote.appData.gigs?.length||0)>0;
    const localHasGigs=(appState.gigs?.length||0)>0;
    const shouldPull=(forceCloud&&cloudHasGigs)||(!forceCloud&&remoteTs>localTs);
    if(shouldPull){
      appState={...remote.appData,_updatedAt:remoteTs};
      localStorage.setItem('tyo_v5',JSON.stringify(appState));
      renderDashboard();
      showToast('Synced from cloud ☁');
    }else if(localHasGigs||!cloudHasGigs){
      syncToCloud();
    }
  }catch(e){}
}

async function subscribeToPremium(){
  if(!syncUser){renderSyncModal('signin');return;}
  if('getDigitalGoodsService' in window){
    // Running inside Play Store TWA — use Google Play Billing
    try{
      const svc=await window.getDigitalGoodsService('https://play.google.com/billing');
      const[item]=await svc.getDetails([PLAY_PRODUCT_ID]);
      if(!item){showToast('Product unavailable');return;}
      const req=new PaymentRequest([{
        supportedMethods:'https://play.google.com/billing',
        data:{sku:PLAY_PRODUCT_ID}
      }],{total:{label:'Premium',amount:{currency:'USD',value:'0'}}});
      const res=await req.show();
      await res.complete('success');
      // Store purchase — in production a Cloud Function would verify this token
      const expiresAt=new Date(Date.now()+366*24*3600*1000);
      await _fbDb.collection('users').doc(syncUser.uid).set({
        premium:{status:'active',purchaseToken:res.details?.purchaseToken||'',grantedAt:firebase.firestore.FieldValue.serverTimestamp(),expiresAt}
      },{merge:true});
      isPremiumUser=true;
      closeSyncModal();
      showToast('Premium activated — sync is on!');
      syncToCloud();
      renderSettingsScreen();
    }catch(e){
      if(e.name!=='AbortError')showToast('Purchase failed. Try again.');
    }
  }else{
    // On web — guide them to subscribe via Android app
    renderSyncModal('web-sub');
  }
}

function showSyncModal(step){
  _syncModalStep=step||(syncUser?(isPremiumUser?'active':'premium'):'signin');

}

document.addEventListener('touchstart', e => {

}, {passive: false});

// Android back gesture — collapse expanded items first, confirm exit if nothing is open
history.pushState(null, '');
window.addEventListener('popstate', function(){
  history.pushState(null, '');
  // 1. Close confirm dialog if open
  if(document.getElementById('confirmOverlay').style.display!=='none'){closeConfirm();return;}
  // 2. Collapse open library item
  if(openLibId){openLibId=null;renderLibraryScreen();return;}

  const screen=document.querySelector('.screen.active')?.id;
  if(screen&&screen!=='screenDash'){goBack('screenDash');return;}
  // 4. On dashboard — confirm before exit
  appConfirm('Exit Production Checklist?',()=>{window.close();},'Exit');
});

function migrateItems(items){
  return items.map(i=>typeof i==='string'?{text:i,shared:/^lav mics/i.test(i)}:i);

function loadState(){
  try{const s=localStorage.getItem('tyo_v5');if(s)appState=JSON.parse(s);}catch(e){}
  if(!appState.categories)appState.categories=JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  if(!appState.templates)appState.templates=JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
  // Migrate: rename Teardown → Wrap on existing gigs
  (appState.gigs||[]).forEach(g=>(g.phases||[]).forEach(p=>{if(p.label==='Teardown')p.label='Wrap';}));
  saveState();
  if(!appState.gigs)appState.gigs=[];
  appState.categories.forEach(cat=>{
    cat.items=migrateItems(cat.items||[]);
    if(!cat.setup)cat.setup=[];
    if(!cat.teardown)cat.teardown=[];
  });
  // Migrate template order
  const tplIds=appState.templates.map(t=>t.id);
  if(!appState.templateOrder)appState.templateOrder=[...tplIds];
  appState.templateOrder=appState.templateOrder.filter(id=>tplIds.includes(id));
  tplIds.forEach(id=>{if(!appState.templateOrder.includes(id))appState.templateOrder.push(id);});
  saveState();
}
function saveState(){
  appState._updatedAt=Date.now();
  try{localStorage.setItem('tyo_v5',JSON.stringify(appState));}catch(e){}

}

function gigProgress(gig){let done=0,total=0;(gig.phases||[]).forEach(p=>p.categories.forEach(c=>c.items.forEach(i=>{total++;if(i.checked)done++;})));return{done,total};}
function phasesDone(gig){return(gig.phases||[]).map(p=>{const items=p.categories.flatMap(c=>c.items);return items.length>0&&items.every(i=>i.checked);});}
function gigKitsDone(gig){let n=0;(gig.phases?.[0]?.categories||[]).forEach(c=>{if(c.items.length&&c.items.every(i=>i.checked))n++;});return n;}
function totalKits(gig){return gig.phases?.[0]?.categories?.length||0;}

function dayLabel(ds){
  const d=new Date(ds+'T12:00:00'),t=new Date();t.setHours(12,0,0,0);
  const tom=new Date(t);tom.setDate(tom.getDate()+1);
  if(d.toDateString()===t.toDateString())return'TODAY';
  if(d.toDateString()===tom.toDateString())return'TOMORROW';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
function formatTime(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;}

// Pointer-based drag (works on touch + mouse)
let _tplDrag=null;
function _nearestCard(cx,cy,excludeId){
  let best=null,bestDist=Infinity;
  for(const c of document.querySelectorAll('.kit-card')){
    if(c.id==='kitcard_'+excludeId)continue;
    const r=c.getBoundingClientRect();
    const dist=Math.hypot(cx-(r.left+r.width/2),cy-(r.top+r.height/2));
    if(dist<bestDist){bestDist=dist;best=c;}
  }
  return best;
}
function startTplDrag(e,id){
  if(e.target.closest('.kit-card-check'))return;
  e.preventDefault();
  try{e.target.setPointerCapture(e.pointerId);}catch(_){}
  const card=document.getElementById('kitcard_'+id);if(!card)return;
  const rect=card.getBoundingClientRect();
  _tplDrag={id,card,ghost:null,ox:e.clientX-rect.left,oy:e.clientY-rect.top,gw:rect.width,gh:rect.height,startX:e.clientX,startY:e.clientY,lastX:e.clientX,lastY:e.clientY,active:false};
  document.addEventListener('pointermove',_onTplMove,{passive:false});
  document.addEventListener('pointerup',_onTplUp);
  document.addEventListener('pointercancel',_onTplCancel);
}
function _ghostCenter(px,py){
  return{cx:px-_tplDrag.ox+_tplDrag.gw/2,cy:py-_tplDrag.oy+_tplDrag.gh/2};
}
function _onTplMove(e){
  if(!_tplDrag)return;
  _tplDrag.lastX=e.clientX;_tplDrag.lastY=e.clientY;
  if(!_tplDrag.active){
    if(Math.hypot(e.clientX-_tplDrag.startX,e.clientY-_tplDrag.startY)<8)return;
    // Threshold crossed — commit to drag
    _tplDrag.active=true;
    const ghost=_tplDrag.card.cloneNode(true);ghost.removeAttribute('id');
    const r=_tplDrag.card.getBoundingClientRect();
    ghost.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;opacity:.85;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2);border-radius:10px;`;
    document.body.appendChild(ghost);
    _tplDrag.card.style.opacity='0.35';
    _tplDrag.ghost=ghost;
    // Block the upcoming click so it doesn't toggle selection
    document.addEventListener('click',function(ev){ev.stopPropagation();},{once:true,capture:true});
  }
  e.preventDefault();
  _tplDrag.ghost.style.left=(e.clientX-_tplDrag.ox)+'px';
  _tplDrag.ghost.style.top=(e.clientY-_tplDrag.oy)+'px';
  const{cx,cy}=_ghostCenter(e.clientX,e.clientY);
  document.querySelectorAll('.kit-card').forEach(c=>c.classList.remove('drag-over'));
  _nearestCard(cx,cy,_tplDrag.id)?.classList.add('drag-over');
}

function _nearestRow(y,excludeIdx){

  document.querySelectorAll('#kitlist_'+_listDrag.catId+' .kit-item-row, #kitlist_'+_listDrag.catId+' .step-row').forEach((r,i)=>{
    if(i===excludeIdx)return;

function _onListMove(e){

function _onListUp(e){

function buildGig(){
  const name=document.getElementById('newGigName').value.trim()||'Untitled Gig';
  const date=document.getElementById('newGigDate').value;
  const callTime='';
  const seen=new Set(),packing=[];
  [...selectedKitIds].forEach(tplId=>{
    const tpl=getTpl(tplId);if(!tpl)return;
    (tpl.categoryIds||[]).forEach(catId=>{
      if(seen.has(catId))return;seen.add(catId);
      const cat=getCat(catId);if(!cat)return;
      packing.push({id:uid(),title:cat.title,globalCatId:catId,
        items:cat.items.map(item=>{const text=typeof item==='string'?item:item.text;const shared=typeof item==='string'?/^lav mics/i.test(text):(!!item.shared||/^lav mics/i.test(text));return{id:uid(),text,checked:false,note:'',shared};})
      });
    });
  });
  const extras=extraTasks.filter(t=>t.text.trim());
  if(extras.length)packing.push({id:uid(),title:'One-Off Tasks',items:extras.map(t=>({id:uid(),text:t.text.trim(),checked:false,note:'',shared:!!t.shared}))});
  function buildRoutinePhase(packingCats,routineKey,phaseId,label){
    const cats=[];
    packingCats.forEach(pc=>{
      if(!pc.globalCatId)return;
      const libCat=getCat(pc.globalCatId);
      const steps=(libCat&&libCat[routineKey])||[];
      if(!steps.length)return;
      cats.push({id:uid(),title:pc.title,globalCatId:pc.globalCatId,
        items:steps.map(s=>({id:uid(),text:typeof s==='string'?s:s.text,checked:false,note:'',shared:false}))});
    });
    return{id:phaseId,label,categories:cats};
  }
  const gig={id:uid(),name,date,callTime,kitIds:[...selectedKitIds],phases:[
    {id:'packing',label:'Packing',categories:packing},
    buildRoutinePhase(packing,'setup','setup','Setup'),
    buildRoutinePhase(packing,'teardown','teardown','Wrap'),
  ]};
  appState.gigs.unshift(gig);saveState();
  activeGigId=gig.id;activePhaseIdx=0;renderChecklistScreen();showScreen('screenChecklist');
}

function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=e.target.result.split(/\r?\n/);
    let kitsAdded=0,itemsAdded=0;
    // skip header row
    for(let i=1;i<lines.length;i++){
      const cols=parseCSVRow(lines[i]);
      if(cols.length<1)continue;
      const kitName=(cols[0]||'').trim();
      const packingText=(cols[1]||'').trim();
      const doImportant=(cols[2]||'').trim();
      const setupText=(cols[3]||'').trim();
      const teardownText=(cols[4]||'').trim();
      if(!kitName||(![packingText,setupText,teardownText].some(Boolean)))continue;
      let cat=appState.categories.find(c=>c.title.toLowerCase()===kitName.toLowerCase());
      if(!cat){
        cat={id:uid(),title:kitName,items:[],setup:[],teardown:[]};
        appState.categories.push(cat);
        kitsAdded++;
      }
      if(!cat.setup)cat.setup=[];
      if(!cat.teardown)cat.teardown=[];
      if(packingText){cat.items.push({text:packingText,shared:!!doImportant});itemsAdded++;}
      if(setupText){cat.setup.push({text:setupText});itemsAdded++;}
      if(teardownText){cat.teardown.push({text:teardownText});itemsAdded++;}
    }
    saveState();
    input.value='';
    libraryTab='kits';
    renderLibraryScreen();
    showToast(`Imported ${kitsAdded} kit${kitsAdded!==1?'s':''}, ${itemsAdded} item${itemsAdded!==1?'s':''}`);
  };
  reader.readAsText(file);
}
function parseCSVRow(row){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<row.length;i++){
    const ch=row[i];
    if(ch==='"'){if(inQ&&row[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur);cur='';}
    else cur+=ch;
  }
  cols.push(cur);
  return cols;
}

// Library item drag-to-reorder (triggered from ⋮⋮ handle only)
let _libDrag=null;
function startLibDrag(e,id,type){
  e.preventDefault();
  try{e.target.setPointerCapture(e.pointerId);}catch(_){}
  const item=document.getElementById('libitem_'+id);if(!item)return;
  const rect=item.getBoundingClientRect();
  const ghost=item.cloneNode(true);ghost.removeAttribute('id');
  ghost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;opacity:.85;z-index:999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);border-radius:12px;`;
  document.body.appendChild(ghost);
  item.style.opacity='0.35';
  _libDrag={id,type,item,ghost,oy:e.clientY-rect.top,gh:rect.height,lastY:e.clientY};
  document.addEventListener('pointermove',_onLibDragMove,{passive:false});
  document.addEventListener('pointerup',_onLibDragUp);
  document.addEventListener('pointercancel',_onLibDragCancel);
}
function _nearestLibItem(y,excludeId){
  let best=null,bestDist=Infinity;
  document.querySelectorAll('#libMain .lib-item').forEach(r=>{
    if(r.id==='libitem_'+excludeId)return;
    const rc=r.getBoundingClientRect();const cy=rc.top+rc.height/2;const dist=Math.abs(y-cy);
    if(dist<bestDist){bestDist=dist;best=r;}
  });
  return best;
}
function _onLibDragMove(e){
  if(!_libDrag)return;e.preventDefault();
  _libDrag.lastY=e.clientY;
  _libDrag.ghost.style.top=(e.clientY-_libDrag.oy)+'px';
  const ghostCy=e.clientY-_libDrag.oy+_libDrag.gh/2;
  document.querySelectorAll('#libMain .lib-item').forEach(r=>r.classList.remove('drag-over'));
  const nearest=_nearestLibItem(ghostCy,_libDrag.id);
  if(nearest)nearest.classList.add('drag-over');
}
function _onLibDragCancel(){
  if(!_libDrag)return;
  cancelLP();
  if(_libDrag.ghost)_libDrag.ghost.remove();
  _libDrag.item.style.opacity='';
  document.querySelectorAll('.lib-item').forEach(r=>r.classList.remove('drag-over'));
  document.removeEventListener('pointermove',_onLibDragMove);
  document.removeEventListener('pointerup',_onLibDragUp);
  document.removeEventListener('pointercancel',_onLibDragCancel);
  _libDrag=null;
}
function _onLibDragUp(e){
  if(!_libDrag)return;
  const{id,type,item,ghost,lastY,oy,gh}=_libDrag;
  const ghostCy=(e?.clientY??lastY)-oy+gh/2;
  ghost.remove();item.style.opacity='';
  document.querySelectorAll('.lib-item').forEach(r=>r.classList.remove('drag-over'));
  document.removeEventListener('pointermove',_onLibDragMove);
  document.removeEventListener('pointerup',_onLibDragUp);
  document.removeEventListener('pointercancel',_onLibDragCancel);
  const allItems=[...document.querySelectorAll('#libMain .lib-item')];
  const fromIdx=allItems.findIndex(r=>r.id==='libitem_'+id);
  const nearest=_nearestLibItem(ghostCy,id);
  _libDrag=null;
  if(!nearest||fromIdx===-1)return;
  const toIdx=allItems.findIndex(r=>r===nearest);
  if(fromIdx===toIdx||toIdx===-1)return;
  if(type==='tpl'){
    const[moved]=appState.templates.splice(fromIdx,1);appState.templates.splice(toIdx,0,moved);
    if(appState.templateOrder){const[mid]=appState.templateOrder.splice(fromIdx,1);appState.templateOrder.splice(toIdx,0,mid);}
  } else {
    const[moved]=appState.categories.splice(fromIdx,1);appState.categories.splice(toIdx,0,moved);
  }
  saveState();renderLibraryScreen();
}

function phaseDotStyle(pct,total){
  if(total===0)return'background:var(--surface2);border-color:var(--border);color:var(--border2)';
  if(pct===100)return'background:var(--green);border-color:var(--green);color:#fff';
  if(pct>0)return'background:var(--orange);border-color:var(--orange);color:#fff';
  return'';
}
function updateClProgress(){
  const gig=getActiveGig();if(!gig)return;
  const labels=['P','S','W'];
  // Per-phase data
  const phases=gig.phases.map((ph,pi)=>{
    const{done,total}=phaseProgress(ph);
    const pct=total?Math.round(done/total*100):0;
    return{ph,pi,done,total,pct};
  });
  // Master progress bar — all phases combined
  const totalDone=phases.reduce((s,p)=>s+p.done,0);
  const totalAll=phases.reduce((s,p)=>s+p.total,0);
  const totalPct=totalAll?Math.round(totalDone/totalAll*100):0;
  const kd=gig.phases[0]?.categories.filter(c=>c.items.length&&c.items.every(i=>i.checked)).length||0;
  const kt=gig.phases[0]?.categories.length||0;
  document.getElementById('clProgressLabel').innerHTML=`<b>${kd} / ${kt} kits packed</b> · ${totalDone} / ${totalAll} total items`;
  document.getElementById('clProgressPct').textContent=totalPct+'%';
  const fill=document.getElementById('progressFill');
  if(fill){
    const wasFull=parseFloat(fill.style.width||0)>=100;
    fill.style.width=totalPct+'%';
    fill.style.background=totalPct===100?'var(--green)':'var(--orange)';
    if(totalPct===100&&!wasFull){fill.classList.add('flash');fill.addEventListener('animationend',()=>fill.classList.remove('flash'),{once:true});const f=document.getElementById('completeFlash');f.classList.add('show');setTimeout(()=>f.classList.remove('show'),800);}
  }
  // Mobile P/S/W dots in header
  const mobileDots=document.getElementById('clPhaseDots');
  if(mobileDots)mobileDots.innerHTML=labels.map((l,i)=>{const p=phases[i]?.pct||0;const t=phases[i]?.total??-1;return`<div class="gig-phase-dot" style="${phaseDotStyle(p,t)}">${l}</div>`;}).join('');
  // Desktop column bars + stats + rail dots — all phases every time
  phases.forEach(({pi,done,total,pct})=>{
    const bar=document.getElementById('dtbar_'+pi);
    if(bar){bar.style.width=pct+'%';bar.style.background=pct===100?'var(--green)':pct>0?'var(--orange)':'transparent';}
    const lbl=bar?.closest('.dt-phase-col')?.querySelector('.phase-stats');
    if(lbl){lbl.textContent=done+'/'+total;lbl.className='phase-stats'+(pct===100?' complete':'');}
  });
  // Rail dots + bar for active gig
  document.querySelectorAll('#gigRail .gig-rail-item.active .gig-phase-dot').forEach((dot,i)=>{
    if(i>=phases.length)return;
    dot.setAttribute('style',phaseDotStyle(phases[i].pct,phases[i].total));
  });
  const activeRailItem=document.querySelector('#gigRail .gig-rail-item.active');
  if(activeRailItem){
    const railFill=activeRailItem.querySelector('.gig-rail-bar-fill');
    if(railFill){
      railFill.style.width=totalPct+'%';
      railFill.style.background=totalPct===100?'var(--green)':totalPct>0?'var(--orange)':'var(--surface3)';
    }
    const railMeta=activeRailItem.querySelector('.gig-rail-meta');
    if(railMeta){
      const gig=getActiveGig();
      const ds=gig?.date?new Date(gig.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
      railMeta.textContent=(ds?ds+' · ':'')+totalDone+' / '+totalAll+' items';
    }
  }
}

  if(activePhaseIdx===2)html+=`<div class="teardown-lead">Everything that went out comes back. Wrap it up. Confirm each kit before you leave.</div>`;

  clMain.innerHTML=html;

function phaseProgress(phase){let done=0,total=0;phase.categories.forEach(c=>c.items.forEach(i=>{total++;if(i.checked)done++;}));return{done,total};}

function exportLibrary(){
  const data={version:1,exported:new Date().toISOString(),categories:appState.categories,templates:appState.templates,templateOrder:appState.templateOrder};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='gig-checklist-library.json';a.click();URL.revokeObjectURL(url);
  showToast('Library exported');
}
function importLibrary(){
  const input=document.createElement('input');input.type='file';input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.categories)||!Array.isArray(data.templates)){showToast('Invalid file');return;}
        if(!confirm('Replace your current library with the imported data? Your existing kits and packs will be overwritten.'))return;
        appState.categories=data.categories;
        appState.templates=data.templates;
        if(data.templateOrder)appState.templateOrder=data.templateOrder;
        appState.categories.forEach(cat=>{cat.items=migrateItems(cat.items||[]);if(!cat.setup)cat.setup=[];if(!cat.teardown)cat.teardown=[];});
        saveState();showToast('Library imported');
      }catch(err){showToast('Could not read file');}
    };
    reader.readAsText(file);
  };
  input.click();
}
function toggleSetting(key){
  const s=getSettings();
  if(key==='remindersEnabled'&&!s.remindersEnabled&&'Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission().then(()=>{s[key]=!s[key];saveSettings();renderSettingsScreen();});return;
  }
  s[key]=!s[key];saveSettings();renderSettingsScreen();
}
